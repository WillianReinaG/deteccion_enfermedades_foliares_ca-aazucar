name: CD Docker Hub

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*", "v*"]

env:
  IMAGE: willianalbertorein/trabajofinalproyecto3

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: sugarcane-ai:dockerhub-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: docker run --rm sugarcane-ai:dockerhub-smoke test

      - name: Tag y push a Docker Hub
        run: |
          docker tag sugarcane-ai:dockerhub-smoke ${{ env.IMAGE }}:latest
          docker tag sugarcane-ai:dockerhub-smoke ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
